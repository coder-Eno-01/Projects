<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link rel="stylesheet" href="stylesheets/mainStyles.css">
    <link rel="stylesheet" href="stylesheets/extraStyles.css">
    <link rel="icon" href="https://www.svgrepo.com/show/488071/block-toys.svg">
</head>

</script>

<body>
    <div id="homeScreen">
        <div id="homeContent"></div>
    </div>

    <main class="gameHidden">
        <div id="scoreBoard">
            <div id="score">
                <h2>Score</h2>
                <h3>0</h3>
            </div>

            <div id="best">
                <h2>Best</h2>
                <h3>0</h3>
            </div>
        </div>

        <div id="specialButtons">
            <button id="undo" class="SPB" type="button">
                ⟲
                <span class="numMoves">1</span>
            </button>
            <button id="delete" class="SPB" type="button">
                🗑️
                <span class="numMoves">1</span>
            </button>
            <button id="switch" class="SPB" type="button">
                ⇄
                <span class="numMoves">1</span>
            </button>
        </div>

        <div id="board">
            <!-- Tiles will be generated here -->
        </div>

        <button id="newGame" type="button">New Game</button>
    </main>

    <div id="themes" class="gameHidden">
        <h3>Themes</h3>
        <button class="changeTheme" type="button">◀</button>
        <button class="changeTheme" type="button">▶</button>
    </div>

    <button id="leaderboard" type="button" class="gameHidden">
        🏆
    </button>

    <div id="loading" class="hidden">
        <div class="loader"></div>
        <h3>Retrieving scores from database</h3>
        <h5>(Fetches may take up to ~50s)</h5>
    </div>

    <div id="LeaderBoard" class="hidden">
        <div id="leadingPlayer">
            <img id="rankIcon" src="assets/diamond_rank.svg" alt="diamond rank">
            <div id="playerIcon">
                <img src="assets/default_profile.svg" alt="Player Icon">
                <button id="changeIcon" type="button"><img src="assets/change_icon.svg" alt="Change Icon"></button>
            </div>
            <h4></h4>
            <h2></h2>
            <h5></h5>
        </div>
        <div class="leader">
            <img class="rank" src="assets/gold_medal.svg" alt="gold rank">
            <div class="player"></div>
            <div class="score"></div>
        </div>
        <div class="leader">
            <img class="rank" src="assets/silver_medal.svg" alt="silver rank">
            <div class="player"></div>
            <div class="score"></div>
        </div>
        <div class="leader">
            <img class="rank" src="assets/fourth_place.svg" alt="bronze rank">
            <div class="player"></div>
            <div class="score"></div>
        </div>
        <div class="leader">
            <img class="rank" src="assets/fifth_place.svg" alt="neutral medal">
            <div class="player"></div>
            <div class="score"></div>
        </div>
    </div>

    <div id="gameOver" class="hidden">
        <img src="assets/the_end.jpg" alt="Game Over">
        <div>
            <button id="restart" type="button"><h4 class="GO">Restart</h4></button>
            <button id="checkLeaderboard" type="button"><h4 class="GO">Leaderboard</h4></button>
            <button id="savour" type="button"><h6 class="GO"><i>Savour Effort</i></h6></button>
        </div>
    </div>

    <footer id="myFooter"></footer>
    <script src="helpers/tile.js"></script>
    <script src="helpers/tilegrid.js"></script>
    <script src="helpers/util.js"></script>
    <script src="helpers/pushTile.js"></script>
    <script src="helpers/themes.js"></script>
    <script src="helpers/leaderboard.js"></script>
    <script src="helpers/introAnimation.js"></script>
    <script src="helpers/homeScreen.js"></script>
    <script src="index.js"></script>
</body>
</html>
